apiVersion: 1

datasources:
  - name: EmissionsDB
    uid: emissions-postgres
    type: postgres
    url: postgres:5432
    database: emissions
    user: ${POSTGRES_USER}
    secureJsonData:
      password: ${POSTGRES_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 10
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1600
      timescaledb: false
    isDefault: true
    editable: true
