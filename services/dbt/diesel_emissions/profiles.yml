diesel_emissions:
  target: dev
  outputs:
    dev:
      type: postgres
      host:     "{{ env_var('DBT_HOST', 'postgres') }}"
      user:     "{{ env_var('POSTGRES_USER', 'admin') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'admin123') }}"
      port:     5432
      dbname:   emissions
      schema:   public
      threads:  4
      connect_timeout: 10
